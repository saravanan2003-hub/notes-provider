    hash: "$2b$10$iTA0DGjsarPEGkqMI1igwukHeexjwExdBV7jyWQkCNhI1IFk05NKC"
    username: "alice"
    userID: "user-alice"
  - email: "bob@example.com"
    hash: "$2b$10$Uyb//SCBy1MGyDIf6.Oa7OP5fOG.m63NG.RewxPP5FTz1J4ly5YUW"
    username: "bob"
    userID: "user-bob"
