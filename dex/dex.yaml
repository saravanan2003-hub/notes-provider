issuer: $ISSUER

storage:
  type: memory

web:
  http: 0.0.0.0:15556
  allowedOrigins:
    - "*"

grpc:
  addr: 0.0.0.0:15557

oauth2:
  responseTypes:
    - code
  skipApprovalScreen: true
  passwordConnector: local

expiry:
  idTokens: 2m
  signingKeys: 6h

staticClients:
  - id: notes-public-pkce
    name: Notes Public PKCE
    public: true
    redirectURIs:
      - http://localhost:8765/callback
      - http://127.0.0.1:8765/callback

  - id: notes-confidential
    secret: notes-confidential-secret
    name: Notes Confidential
    redirectURIs:
      - http://localhost:8765/callback
      - http://127.0.0.1:8765/callback

  - id: notes-machine
    secret: notes-machine-secret
    name: Notes Machine
    redirectURIs:
      - http://localhost:8765/callback
      - http://127.0.0.1:8765/callback

enablePasswordDB: true

staticPasswords:
  - email: "alice@example.com"
    hash: "$2b$10$iTA0DGjsarPEGkqMI1igwukHeexjwExdBV7jyWQkCNhI1IFk05NKC"
    username: "alice"
    userID: "user-alice"
  - email: "bob@example.com"
    hash: "$2b$10$Uyb//SCBy1MGyDIf6.Oa7OP5fOG.m63NG.RewxPP5FTz1J4ly5YUW"
    username: "bob"
    userID: "user-bob"
  - email: "carol@example.com"
    hash: "$2b$10$Xo5wWOrwdoXKc6ctUaAbIuuunuNOBNDHK2xEQSHSEWyh/vg9Gtxym"
    username: "carol"
    userID: "user-carol"

