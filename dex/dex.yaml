issuer: $ISSUER

storage:
  type: memory

web:
  http: 0.0.0.0:15556
  allowedOrigins:
    - "*"

grpc:
  addr: 0.0.0.0:15557

oauth2:
  responseTypes:
    - code
  skipApprovalScreen: true
  passwordConnector: local

expiry:
  idTokens: 2m
  signingKeys: 6h

enablePasswordDB: true

staticPasswords:
